name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  APP_NAME: swiftswiss

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v5

      - name: Build
        run: make release

      - name: Verify binary
        run: .build/release/${APP_NAME} version

      - name: Get version
        id: version
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tarball
        run: |
          DIR="${APP_NAME}_${{ steps.version.outputs.version }}"
          mkdir "$DIR"
          cp ".build/release/${APP_NAME}" LICENSE README.md "$DIR/"
          tar -cJf "${DIR}.tar.xz" "$DIR"
          shasum -a 256 "${DIR}.tar.xz" > "${DIR}.tar.xz.sha256"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            ${{ env.APP_NAME }}_${{ steps.version.outputs.version }}.tar.xz
            ${{ env.APP_NAME }}_${{ steps.version.outputs.version }}.tar.xz.sha256
          generate_release_notes: true

      - name: Update Homebrew tap
        if: startsWith(github.ref, 'refs/tags/')
        env:
          HOMEBREW_TOKEN: ${{ secrets.HOMEBREW_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TARBALL="${APP_NAME}_${GITHUB_REF_NAME}.tar.xz"
          SHA256=$(shasum -a 256 "$TARBALL" | awk '{print $1}')
          URL="https://github.com/jftuga/${APP_NAME}/releases/download/${GITHUB_REF_NAME}/${TARBALL}"

          FORMULA=$(cat <<EOFORMULA
          # typed: false
          # frozen_string_literal: true

          class SwiftSwiss < Formula
            desc "Swiss army knife CLI tool written in Swift using only native Apple frameworks"
            homepage "https://github.com/jftuga/${APP_NAME}"
            version "${VERSION}"

            on_macos do
              if Hardware::CPU.arm?
                url "${URL}"
                sha256 "${SHA256}"

                define_method(:install) do
                  bin.install "${APP_NAME}"
                end
              end
            end

            test do
              system "#{bin}/${APP_NAME} -v"
            end
          end
          EOFORMULA
          )

          # Remove leading whitespace from heredoc
          FORMULA=$(echo "$FORMULA" | sed 's/^          //')

          # Push formula to homebrew-tap repo
          ENCODED=$(echo -n "$FORMULA" | base64)

          # Check if file already exists to get its SHA (needed for updates)
          EXISTING_SHA=$(curl -s -H "Authorization: token ${HOMEBREW_TOKEN}" \
            "https://api.github.com/repos/jftuga/homebrew-tap/contents/${APP_NAME}.rb" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('sha',''))" 2>/dev/null || echo "")

          JSON_PAYLOAD=$(python3 -c "
          import json
          d = {
              'message': 'Update ${APP_NAME} to ${VERSION}',
              'content': '${ENCODED}',
          }
          sha = '${EXISTING_SHA}'
          if sha:
              d['sha'] = sha
          print(json.dumps(d))
          ")

          curl -s -X PUT \
            -H "Authorization: token ${HOMEBREW_TOKEN}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/jftuga/homebrew-tap/contents/${APP_NAME}.rb" \
            -d "$JSON_PAYLOAD"
